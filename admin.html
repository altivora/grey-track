<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админка</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-size: 16px;
      background-color: #f5f5f5;
    }

    .navbar-brand img {
      width: 40px;
    }

    .profile img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .table-responsive {
      overflow-x: auto;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .day {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 5px;
      min-height: 60px;
      font-size: 0.85rem;
    }

    @media (min-width: 768px) {
      #calendar {
        grid-template-columns: repeat(7, 1fr);
      }
    }

    .btn {
      font-size: 0.9rem;
    }

    .navbar-toggler {
      border: none;
    }

    .navbar-collapse {
      background-color: white;
      padding: 1rem;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <!-- Навбар -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="image/2023-04-14.webp" alt="Logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav w-100">
          <li class="nav-item"><a class="nav-link" href="#">Můj účet</a></li>
          <li class="nav-item"><a class="nav-link" href="shift_schedule.html">Moje směny</a></li>
          <li class="nav-item"><a class="nav-link" href="my_team.html">Můj tým</a></li>
        </ul>
        <button class="btn btn-danger w-100 mt-2" id="logoutBtn">Выйти</button>
      </div>
    </div>
  </nav>

  <!-- Профиль -->
  <div class="container mt-4">
    <div class="profile text-center">
      <img src="image/0fc978aba29e466e8eb4ffc946532d5e.max-1200x800.jpg" alt="Profile">
      <h3 id="name">Jméno:</h3>
      <p>Věk: <span id="age">27</span></p>
      <p>Odpracované hodiny: <span id="hours">120</span></p>
      <p>Pozice: <span id="position">Manager</span></p>
    </div>

    <!-- Кнопка и таблица сотрудников -->
    <div class="mt-4">
      <h4>Správa zaměstnanců</h4>
      <button class="btn btn-success mb-2 w-100">Přidat zaměstnance</button>
      <div class="table-responsive">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>Foto</th>
              <th>Jméno</th>
              <th>Pozice</th>
              <th>Hodiny</th>
              <th>Akce</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><img src="image/worker1.jpg" width="40" class="rounded"></td>
              <td>Jan Novák</td>
              <td>Barista</td>
              <td>100</td>
              <td><button class="btn btn-sm btn-danger">Удалить</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Календарь -->
    <div class="mt-5">
      <h4 class="text-center">Červen 2025</h4>
      <div id="calendar" class="mt-3">
        <div class="day">1<br>Anna</div>
        <div class="day">2<br>Petr</div>
        <div class="day">3<br>-</div>
        <div class="day">4<br>-</div>
        <div class="day">5<br>Eva</div>
        <div class="day">6<br>Tomáš</div>
        <div class="day">7<br>-</div>
      </div>
    </div>
  </div>

  <!-- Скрипты -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
