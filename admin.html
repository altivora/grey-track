<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Админка</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
      font-size: 14px;
      padding-bottom: 4rem;
    }

    .profile img {
      width: 100%;
      max-width: 200px;
      border-radius: 10px;
    }

    .table-responsive {
      overflow-x: auto;
    }

    .day {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 5px;
      min-height: 70px;
      font-size: 0.85rem;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    @media (max-width: 576px) {
      h2, h3 {
        font-size: 1.2rem;
      }

      .btn {
        font-size: 0.8rem;
        padding: 6px 10px;
      }

      #calendar {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>

  <!-- Навбар -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="image/2023-04-14.webp" alt="Logo" width="40">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navContent">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a href="#" class="nav-link">Můj účet</a>
          </li>
          <li class="nav-item">
            <a href="shift_schedule.html" class="nav-link">Moje směny</a>
          </li>
          <li class="nav-item">
            <a href="my_team.html" class="nav-link">Můj tým</a>
          </li>
        </ul>
        <button id="logoutBtn" class="btn btn-danger ms-auto">Выйти</button>
      </div>
    </div>
  </nav>

  <!-- Профиль -->
  <div class="container mt-4">
    <div class="profile text-center">
      <img src="image/0fc978aba29e466e8eb4ffc946532d5e.max-1200x800.jpg" alt="Profile" class="img-thumbnail mb-3">
      <h2 id="name">Jméno:</h2>
      <p>Věk: <span id="age"></span></p>
      <p>Odpracované hodiny: <span id="hours">0</span></p>
      <p>Pozice: <span id="position"></span></p>
    </div>

    <!-- Управление сотрудниками -->
    <h3 class="mt-4">Správa zaměstnanců</h3>
    <button class="btn btn-success mb-2" data-bs-toggle="modal" data-bs-target="#employeeModal">Přidat zaměstnance</button>

    <div class="table-responsive">
      <table class="table table-bordered table-striped" id="employeesTable">
        <thead>
          <tr>
            <th>Foto</th>
            <th>Jméno</th>
            <th>Pozice</th>
            <th>Hodiny</th>
            <th>Akce</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- Календарь -->
    <div class="mt-5" id="shiftScheduleSection" style="display:none;">
      <h3 class="text-center" id="currentMonth">Месяц</h3>
      <div id="calendar" class="mt-3"></div>
    </div>
  </div>

  <!-- Модальные окна и скрипты -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin_script.js"></script>
</body>
</html>
