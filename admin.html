<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка — Управление сотрудниками</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url(image/1.png);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      padding: 1rem;
      font-size: 14px;
    }

    h2, h3 {
      color: white;
      font-size: 1.5rem;
    }

    .profile p, .profile h2 {
      color: white;
      font-size: 1rem;
    }

    .profile img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .navbar-brand img {
      border-radius: 10px;
      width: 50px !important;
      height: auto;
    }

    .navbar-nav .btn {
      font-size: 0.85rem;
      padding: 6px 8px;
    }

    #calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 20px;
      user-select: none;
    }

    .day {
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 5px;
      min-height: 80px;
      cursor: pointer;
      background: #fff;
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
    }

    .day strong {
      font-weight: 600;
      margin-bottom: 4px;
    }

    #employeesTable {
      width: 100%;
      overflow-x: auto;
      display: block;
    }

    #employeesTable table {
      min-width: 600px;
    }

    .btn {
      font-size: 0.9rem;
      padding: 6px 10px;
    }

    .modal-dialog {
      max-width: 90vw;
    }

    .modal-content {
      font-size: 0.9rem;
    }

    @media (max-width: 576px) {
      #calendar {
        gap: 5px;
      }

      .day {
        min-height: 60px;
        font-size: 0.8rem;
        padding: 4px;
      }

      h2, h3 {
        font-size: 1.2rem;
      }

      .profile p, .profile h2 {
        font-size: 0.9rem;
      }

      .navbar-nav .btn {
        font-size: 0.75rem;
        padding: 4px 6px;
      }

      #employeesTable {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>
<body class="bg-light p-4">
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="image/2023-04-14.webp" alt=""></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="#" class="btn btn-light border-3 me-3">Můj účet</a>
          </li>
          <li class="nav-item">
            <a href="shift_schedule.html" class="btn btn-light border-3 me-3">Moje směny</a>
          </li>
          <li class="nav-item">
            <a href="my_team.html" class="btn btn-light border-3">Můj tým</a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-danger">Выйти</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="profile mt-5 mb-4">
    <img src="image/0fc978aba29e466e8eb4ffc946532d5e.max-1200x800.jpg" class="img-thumbnail" width="200" alt="Профиль">
    <h2 id="name">Jméno:</h2>
    <p>Věk: <span id="age"></span></p>
    <p>Odpracované hodiny: <span id="hours">0</span></p>
    <p>Pracovní pozice: <span id="position"></span></p>
  </div>

  <div class="container">
    <h2 class="mb-4">Správa zaměstnanců:</h2>
    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#employeeModal">Přidat zaměstnance</button>
    <div id="employeesTable">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Foto</th>
            <th>Jméno</th>
            <th>Pozice</th>
            <th>Odpracované hodiny</th>
            <th>Akce</th>
          </tr>
        </thead>
        <tbody>
          <!-- Сотрудники появятся здесь -->
        </tbody>
      </table>
    </div>
    <div id="shiftScheduleSection" style="display:none;">
      <h3 class="mt-5 text-center" id="currentMonth"></h3>
      <div id="calendar"></div>
    </div>
  </div>

  <!-- Модальные окна и скрипты --><!-- ... они идут после тела, как обычно ... -->
  <!-- Здесь должен быть подключён ваш JavaScript -->
  <script src="admin_script.js"></script>
</body>
</html>
