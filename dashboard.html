<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Дэшборд сотрудника</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
  <style>
    body {
      background-image: url(image/1.png);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      color: white;
    }
    .navbar-brand img {
      border-radius: 10px;
      max-height: 50px;
    }
    .card {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      color: white;
    }
    .fc-daygrid-day-number {
      color: white !important;
    }
    .fc-col-header-cell-cushion {
      color: white !important;
    }
    h2, h4, p {
      color: white;
    }
    /* Отступы и размеры для мобильных */
    @media (max-width: 576px) {
      body {
        padding: 1rem !important;
      }
      .navbar-brand img {
        max-height: 40px;
      }
      h2 {
        font-size: 1.5rem;
      }
      h4 {
        font-size: 1.2rem;
      }
      #empPhoto {
        max-width: 100%;
        height: auto;
        margin-bottom: 1rem;
        border-radius: 10px;
      }
      /* Вертикальное расположение в карточке */
      .employee-info-row {
        flex-direction: column !important;
        align-items: center !important;
        text-align: center;
      }
      #calendar {
        height: 400px !important;
        margin-top: 1rem;
      }
      #addShiftBtn {
        width: 100%;
        margin-top: 1rem;
      }
      .card p, .card h4 {
        margin-bottom: 0.5rem;
      }
    }
    /* На больших экранах задаём высоту календаря */
    @media (min-width: 577px) {
      #calendar {
        height: 600px !important;
      }
    }
  </style>
</head>
<body class="bg-light p-4">

  <nav class="navbar navbar-expand-lg navbar-light bg-transparent">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><img src="image/2023-04-14.webp" alt="Логотип"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="dashboard.html" class="btn btn-light border-3 me-3" role="button">Můj účet</a>
          </li>
        </ul>

        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-danger" type="button">Выйти</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
      <h2>Личный кабинет</h2>
      <button id="logoutBtn" class="btn btn-outline-danger mt-2 mt-sm-0">Выйти</button>
    </div>

    <div class="card p-3">
      <div class="d-flex employee-info-row gap-3 flex-wrap align-items-center">
        <div class="flex-shrink-0">
          <img id="empPhoto" src="https://via.placeholder.com/150" alt="Фото сотрудника" class="img-thumbnail">
        </div>
        <div class="flex-grow-1">
          <h4 id="empName">Имя сотрудника</h4>
          <p><strong>Должность:</strong> <span id="empPosition"></span></p>
          <p><strong>Отработанные часы:</strong> <span id="empHours"></span></p>
          <h4 class="mt-4">Мои смены</h4>
          <div id="calendar"></div>
          <button id="addShiftBtn" class="btn btn-primary mt-3">Записаться на смену сегодня (8 ч)</button>
        </div>
      </div>
    </div>

    <div id="message" class="alert alert-success mt-4 d-none"></div>
  </div>

  <!-- Модальное окно для добавления смены -->
  <div class="modal fade" id="hoursModal" tabindex="-1" aria-labelledby="hoursModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content bg-dark text-white">
        <div class="modal-header">
          <h5 class="modal-title" id="hoursModalLabel">Добавление смены</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        <div class="modal-body">
          <p id="modalDateText"></p>
          <label for="startTime" class="form-label">Начало смены:</label>
          <input type="time" id="startTime" class="form-control mb-3" required>
          <label for="endTime" class="form-label">Окончание смены:</label>
          <input type="time" id="endTime" class="form-control" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
          <button type="button" class="btn btn-primary" id="saveHoursBtn">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script>
    const userId = localStorage.getItem('user');
    const employees = JSON.parse(localStorage.getItem('employees') || '[]');
    const emp = employees.find(e => e.id === userId);

    if (!emp) {
      alert('Сотрудник не найден');
      window.location.href = 'authorization.html';
    }

    emp.shifts = emp.shifts || [];
    let selectedDate = null;

    function updateEmployeeData() {
      document.getElementById('empName').textContent = emp.name;
      document.getElementById('empPosition').textContent = emp.position;
      document.getElementById('empHours').textContent = emp.hours || 0;
      document.getElementById('empPhoto').src = emp.photo || 'https://via.placeholder.com/150';

      const updated = employees.map(e => e.id === emp.id ? emp : e);
      localStorage.setItem('employees', JSON.stringify(updated));
    }

    updateEmployeeData();

    const hoursModal = new bootstrap.Modal(document.getElementById('hoursModal'));

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'dayGridMonth',
      height: window.innerWidth < 576 ? 400 : 600,
      selectable: true,
      // При выделении (drag) — открывать окно добавления
      select(info) {
        selectedDate = info.startStr;
        showAddShiftModal(selectedDate);
      },
      // При клике на день — тоже открывать окно добавления
      dateClick(info) {
        selectedDate = info.dateStr;
        showAddShiftModal(selectedDate);
      },
      events: emp.shifts.map(shift => ({
        title: `Смена (${shift.start}–${shift.end})`,
        start: shift.date
      }))
    });

    calendar.render();

    const MAX_EMPLOYEES_PER_DAY = 5; // максимум сотрудников на одну дату

function showAddShiftModal(dateStr) {
  document.getElementById('modalDateText').textContent = `Вы выбрали: ${dateStr}`;
  document.getElementById('startTime').value = '';
  document.getElementById('endTime').value = '';
  selectedDate = dateStr; // обязательно сохраняем выбранную дату
  hoursModal.show();
}

document.getElementById('saveHoursBtn').addEventListener('click', () => {
  const start = document.getElementById('startTime').value;
  const end = document.getElementById('endTime').value;

  if (!start || !end || start >= end) {
    alert('Укажите корректное время начала и окончания смены.');
    return;
  }

  // Проверка: есть ли уже слишком много сотрудников на выбранную дату
  const allEmployees = JSON.parse(localStorage.getItem('employees') || '[]');
  const alreadyAssignedCount = allEmployees.reduce((count, employee) => {
    return count + ((employee.shifts || []).some(shift => shift.date === selectedDate) ? 1 : 0);
  }, 0);

  if (alreadyAssignedCount >= MAX_EMPLOYEES_PER_DAY) {
    alert('На этот день уже записано максимальное количество сотрудников.');
    return;
  }

  const shiftTitle = `Смена (${start}–${end})`;

  // Добавляем смену сотруднику
  emp.shifts.push({ date: selectedDate, start, end, title: shiftTitle });

  updateEmployeeData();

  calendar.addEvent({
    title: shiftTitle,
    start: selectedDate
  });

  hoursModal.hide();
  showMessage('Смена успешно добавлена!');
});

    document.getElementById('addShiftBtn').addEventListener('click', () => {
      // Добавляем смену на текущий день с 9:00 до 17:00 (пример)
      const todayStr = new Date().toISOString().split('T')[0];
      selectedDate = todayStr;
      showAddShiftModal(todayStr);
      document.getElementById('startTime').value = '09:00';
      document.getElementById('endTime').value = '17:00';
    });

    function showMessage(text) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.classList.remove('d-none');
      setTimeout(() => {
        messageEl.classList.add('d-none');
      }, 4000);
    }

    // Кнопки выхода
    document.querySelectorAll('#logoutBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        localStorage.removeItem('user');
        window.location.href = 'authorization.html';
      });
    });
  </script>
</body>
</html>
