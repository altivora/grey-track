<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Главная страница</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <script>
    const user = localStorage.getItem('user');
    const role = localStorage.getItem('role');

    if (!user || !role) {
      // Если пользователь не вошёл — отправить на авторизацию
      window.location.href = 'authorization.html';
    }
  </script>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Navbar</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a
              class="nav-link active"
              aria-current="page"
              href="#"
              id="accountLink"
              >My account</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" href="shift_schedule.html">Shift schedule</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="my_team.html">My team</a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link disabled"
              href="#"
              tabindex="-1"
              aria-disabled="true"
              >Disabled</a
            >
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <script>
    document.getElementById('accountLink')?.addEventListener('click', function (e) {
      e.preventDefault();
      const user = localStorage.getItem('user');
      const role = localStorage.getItem('role');

      if (!user || !role) {
        alert('Сначала войдите в систему');
        window.location.href = 'authorization.html';
        return;
      }

      if (role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
