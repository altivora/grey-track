<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Главная страница</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"/>
    <style>
      body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a1a2e);
    background-size: 400% 400%;
    animation: darkGradient 15s ease infinite;
    font-family: sans-serif;
    color: white;
  }

  @keyframes darkGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  
}
    </style>
</head>
<body>
  <script>
    const user = localStorage.getItem('user');
    const role = localStorage.getItem('role');

    if (!user || !role) {
      // Если пользователь не вошёл — отправить на авторизацию
      window.location.href = 'authorization.html';
    }
  </script>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Logo</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a
              class="nav-link active"
              aria-current="page"
              href="#"
              id="accountLink"
              >Muy učet</a
            >
          </li>

        
        </ul>
      </div>
    </div>
  </nav>

  <script>
    document.getElementById('accountLink')?.addEventListener('click', function (e) {
      e.preventDefault();
      const user = localStorage.getItem('user');
      const role = localStorage.getItem('role');

      if (!user || !role) {
        alert('Сначала войдите в систему');
        window.location.href = 'authorization.html';
        return;
      }

      if (role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
