<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Форма входа</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a1a2e);
    background-size: 400% 400%;
    animation: darkGradient 15s ease infinite;
    font-family: sans-serif;
    color: white;
  }

  @keyframes darkGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  
}
    .card {
      width: 320px;
      max-width: 90vw; /* чтобы на очень узких экранах не вылазило */
      padding: 1.5rem;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      border-radius: 12px;
    }
    h3 {
      font-size: 1.6rem;
    }
    @media (max-width: 400px) {
      h3 {
        font-size: 1.3rem;
      }
      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card">
    <h3 class="mb-4 text-center">Authorization admin</h3>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Login</label>
        <input type="text" class="form-control" id="username" placeholder="Write your login" required />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Write your password" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Click</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // Вход как админ
      if (username === 'admin' && password === '12345') {
        localStorage.setItem('user', 'admin');
        localStorage.setItem('role', 'admin'); // ← добавляем роль
        window.location.href = 'admin.html';
        return;
      }

      // Вход как сотрудник
      const employees = JSON.parse(localStorage.getItem('employees') || '[]');
      const user = employees.find(emp => emp.login === username && emp.password === password);

      if (user) {
        localStorage.setItem('user', user.id);
        localStorage.setItem('role', 'employee'); // ← добавляем роль
        window.location.href = 'dashboard.html';
      } else {
        alert('Неверный логин или пароль');
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
